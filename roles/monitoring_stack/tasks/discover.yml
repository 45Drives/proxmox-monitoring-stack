- name: Build proxmox API target list from inventory
  ansible.builtin.set_fact:
    proxmox_nodes: >-
      {{
        groups['proxmox']
        | default([])
        | map('extract', hostvars, 'ansible_host')
        | map('regex_replace', '$', ':8006')
        | list
      }}

- name: Build node exporter target list from inventory
  ansible.builtin.set_fact:
    node_exporter_targets: >-
      {{
        groups['proxmox']
        | default([])
        | map('extract', hostvars, 'ansible_host')
        | map('regex_replace', '$', ':9100')
