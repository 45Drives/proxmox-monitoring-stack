- name: Purge Proxmox monitoring stack
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    monitoring_root: /opt/monitoring
    monitoring_repo_root: /opt/proxmox-monitoring-stack
    purge_remove_repo: false
    purge_remove_docker_data: false

  tasks:
    - name: Stop and remove monitoring stack if compose file exists
      ansible.builtin.command:
        cmd: docker compose down --remove-orphans
        chdir: "{{ monitoring_root }}/compose"
      register: purge_compose_down
      failed_when: false
      changed_when: purge_compose_down.rc == 0
      when: ansible_facts['os_family'] == 'Debian'

    - name: Remove monitoring directory tree
      ansible.builtin.file:
        path: "{{ monitoring_root }}"
        state: absent

    - name: Remove Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - docker.io
          - docker-compose
          - docker-compose-v2
          - docker-doc
          - podman-docker
          - containerd
          - runc
        state: absent
        purge: true
        autoremove: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Remove Docker apt repository file
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    - name: Remove Docker apt key
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.asc
        state: absent

    - name: Remove Docker apt keyring directory if empty
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: absent

    - name: Optionally remove Docker data directory
      ansible.builtin.file:
        path: /var/lib/docker
        state: absent
      when: purge_remove_docker_data | bool

    - name: Optionally remove containerd data directory
      ansible.builtin.file:
        path: /var/lib/containerd
        state: absent
      when: purge_remove_docker_data | bool

    - name: Optionally remove cloned repo
      ansible.builtin.file:
        path: "{{ monitoring_repo_root }}"
        state: absent
      when: purge_remove_repo | bool